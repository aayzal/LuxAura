{% extends "base.html" %}
{% block content %}

<section style="padding:60px; text-align:center;">

    <img src="{{ perfume.image }}" style="width:300px;">

    <h2>{{ perfume.name }}</h2>
    <p>{{ perfume.description }}</p>
    <h3>₹{{ perfume.price }}</h3>

</section>

<a href="{% url 'add_to_cart' perfume.id %}" style="
    display:inline-block;
    margin-top:10px;
    padding:10px 20px;
    background:#f7c873;
    color:#000;
    border-radius:20px;
    text-decoration:none;
">
    Add to Cart
</a>


{% endblock %}
