{% extends "base.html" %}
{% block content %}

<h2>Your Orders</h2>

{% for order in orders %}
    <div style="border:1px solid #ccc; padding:20px; margin:20px;">
        <h4>Order #{{ order.id }}</h4>
        <p>Status: {{ order.status }}</p>
        <p>Total: ₹ {{ order.total_amount }}</p>
        <p>Date: {{ order.created_at }}</p>
    </div>
{% empty %}
    <p>No orders yet.</p>
{% endfor %}

{% endblock %}
